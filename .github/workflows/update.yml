on:
  schedule:
    # টেস্টের জন্য ২:৩৪ (UTC তে বাংলাদেশ সময়ের রাত ৮:৩৪)
    # বাংলাদেশ সময় ২:৩৪ মানে UTC ২০:৩৪ (তবে আমরা UTC ২০:৩৪ ই দিচ্ছি)
    # যেহেতু এখন ২:২৮, তাই ২০:৩৪ সময়টি এখনকার জন্য ঠিক আছে।
    - cron: "34 20 * * *" 
    
    # বাকি আগের সিডিউলগুলো
    - cron: "30 13 * * *"
    - cron: "30 18 * * *"
    - cron: "0 0 * * *"
    - cron: "0 4 * * *"
    - cron: "0 8 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:
